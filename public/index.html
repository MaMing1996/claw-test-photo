<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>claw-test-photo</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <main>
    <h1>照片分类管理</h1>

    <section>
      <h2>按时间分类</h2>
      <div class="controls">
        <button data-g="day">日</button>
        <button data-g="month" class="active">月</button>
        <button data-g="year">年</button>
      </div>
      <div id="time-groups" class="grid"></div>
    </section>

    <section>
      <h2>按地点分类（国家）</h2>
      <div id="location-groups" class="grid"></div>
    </section>
  </main>
  <script src="/app.js"></script>
</body>
</html>
